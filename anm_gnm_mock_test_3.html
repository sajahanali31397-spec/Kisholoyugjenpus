<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Test Exam 3 — ANM & GNM Set 3 Mock Test</title>
    <meta name="description" content="ANM & GNM Mock Test - Test Exam 3 with Negative Marking & Live Leaderboard">
    <script>
        window.MathJax = {
            tex: { inlineMath: [['$','$'],['\\(','\\)']], displayMath: [['$$','$$'],['\\[','\\]']] },
            chtml: { fontURL: 'https://cdn.jsdelivr.net/npm/mathjax@3/es5/output/chtml/fonts/woff-v2' },
            startup: { typeset: true }
        };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" async></script>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Bengali:wght@400;500;600;700&family=Inter:wght@400;500;600;700;800;900&family=Outfit:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
    <style>
        /* ===== THEME VARIABLES ===== */
        :root, [data-theme="dark"] {
            --bg-primary: #0b0f19;
            --bg-secondary: #111827;
            --bg-card: #141b2d;
            --bg-card-hover: #1a2440;
            --bg-option: #1a2240;
            --bg-option-hover: #1f2d52;
            --bg-option-selected: #1c3a6e;
            --border-default: #2a3352;
            --border-selected: #60a5fa;
            --text-primary: #f1f5f9;
            --text-secondary: #94a3b8;
            --text-muted: #64748b;
            --accent-blue: #3b82f6;
            --accent-cyan: #06b6d4;
            --accent-purple: #8b5cf6;
            --accent-pink: #ec4899;
            --accent-green: #10b981;
            --accent-red: #ef4444;
            --accent-amber: #f59e0b;
            --shadow-lg: 0 20px 60px rgba(0,0,0,0.5);
            --shadow-card: 0 4px 24px rgba(0,0,0,0.3);
            --shadow-glow: 0 0 30px rgba(59,130,246,0.12);
            --topbar-bg: rgba(11,15,25,0.92);
            --modal-bg: rgba(0,0,0,0.75);
            --print-bg: #0b0f19;
        }

        [data-theme="light"] {
            --bg-primary: #f0f4f8;
            --bg-secondary: #e8ecf1;
            --bg-card: #ffffff;
            --bg-card-hover: #f8f9fb;
            --bg-option: #f3f5f9;
            --bg-option-hover: #e8ecf4;
            --bg-option-selected: #dbeafe;
            --border-default: #d1d9e6;
            --border-selected: #3b82f6;
            --text-primary: #1a1a2e;
            --text-secondary: #4a5568;
            --text-muted: #718096;
            --shadow-lg: 0 20px 60px rgba(0,0,0,0.08);
            --shadow-card: 0 2px 12px rgba(0,0,0,0.06);
            --shadow-glow: 0 0 20px rgba(59,130,246,0.08);
            --topbar-bg: rgba(240,244,248,0.92);
            --modal-bg: rgba(0,0,0,0.4);
            --print-bg: #ffffff;
        }

        * { margin:0; padding:0; box-sizing:border-box; }
        html { scroll-behavior: smooth; }

        body {
            font-family: 'Noto Sans Bengali', 'Outfit', 'Inter', sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            line-height: 1.7;
            min-height: 100vh;
            transition: background-color 0.4s, color 0.4s;
        }

        ::-webkit-scrollbar { width: 7px; }
        ::-webkit-scrollbar-track { background: var(--bg-primary); }
        ::-webkit-scrollbar-thumb { background: var(--border-default); border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: var(--accent-blue); }

        /* ===== THEME TOGGLE ===== */
        .theme-toggle {
            position: fixed; bottom: 24px; right: 24px; z-index: 999;
            width: 50px; height: 50px; border-radius: 50%; border: 2px solid var(--border-default);
            background: var(--bg-card); color: var(--text-primary);
            font-size: 22px; cursor: pointer; display: flex; align-items: center; justify-content: center;
            box-shadow: var(--shadow-card); transition: all 0.3s;
        }
        .theme-toggle:hover { transform: scale(1.1); border-color: var(--accent-blue); box-shadow: 0 0 20px rgba(59,130,246,0.3); }

        /* ===== ANIMATIONS ===== */
        @keyframes fadeUp { from { opacity:0; transform:translateY(30px); } to { opacity:1; transform:translateY(0); } }
        @keyframes pulse { 0%,100% { opacity:1; } 50% { opacity:0.5; } }
        @keyframes shimmer { 0% { background-position: -200% center; } 100% { background-position: 200% center; } }
        .fade-up { animation: fadeUp 0.6s ease-out; }

        /* ===== GRADIENT ===== */
        .gradient-text { background: linear-gradient(135deg, #3b82f6, #8b5cf6, #ec4899); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; }
        .gradient-bg { background: linear-gradient(135deg, #3b82f6 0%, #8b5cf6 50%, #ec4899 100%); }
        .gradient-border { border-image: linear-gradient(135deg, #3b82f6, #8b5cf6, #ec4899) 1; }

        /* ===== REGISTRATION ===== */
        #reg-screen {
            display: flex; align-items: center; justify-content: center; min-height: 100vh; padding: 20px;
            position: relative; overflow: hidden;
        }
        #reg-screen::before, #reg-screen::after {
            content:''; position:absolute; width:500px; height:500px; border-radius:50%; pointer-events:none;
        }
        #reg-screen::before { top:-200px; right:-150px; background: radial-gradient(circle, rgba(59,130,246,0.07) 0%, transparent 70%); }
        #reg-screen::after { bottom:-200px; left:-150px; background: radial-gradient(circle, rgba(139,92,246,0.07) 0%, transparent 70%); }

        .reg-card {
            background: var(--bg-card); border: 1px solid var(--border-default); border-radius: 24px;
            padding: 44px; max-width: 520px; width: 100%; box-shadow: var(--shadow-lg);
            position: relative; z-index: 1; animation: fadeUp 0.6s ease-out;
            transition: background-color 0.4s, border-color 0.4s;
        }
        .reg-logo { text-align: center; margin-bottom: 28px; }
        .reg-logo .icon { width: 68px; height: 68px; border-radius: 18px; display: inline-flex; align-items: center; justify-content: center; font-size: 30px; margin-bottom: 14px; box-shadow: 0 8px 28px rgba(59,130,246,0.3); }
        .reg-logo h1 { font-family: 'Outfit', sans-serif; font-size: 26px; font-weight: 800; }
        .reg-logo .sub { color: var(--text-secondary); font-size: 13px; margin-top: 4px; }

        .exam-pills { display: flex; gap: 8px; justify-content: center; flex-wrap: wrap; margin: 18px 0 24px; }
        .pill { background: var(--bg-option); border: 1px solid var(--border-default); border-radius: 20px; padding: 5px 14px; font-size: 12px; color: var(--text-secondary); font-weight: 500; transition: all 0.3s; }
        .pill strong { color: var(--accent-cyan); }
        .pill.neg { border-color: rgba(239,68,68,0.3); }
        .pill.neg strong { color: var(--accent-red); }

        .form-group { margin-bottom: 18px; }
        .form-group label { display: block; font-size: 12px; font-weight: 600; color: var(--text-secondary); margin-bottom: 7px; text-transform: uppercase; letter-spacing: 0.5px; }
        .form-group input {
            width: 100%; padding: 13px 16px; background: var(--bg-option); border: 1px solid var(--border-default);
            border-radius: 12px; color: var(--text-primary); font-size: 16px; font-family: inherit;
            transition: all 0.3s; outline: none;
        }
        .form-group input:focus { border-color: var(--accent-blue); box-shadow: 0 0 0 3px rgba(59,130,246,0.15); }
        .form-group input::placeholder { color: var(--text-muted); }

        .btn-primary {
            width: 100%; padding: 15px; border: none; border-radius: 12px; color: white;
            font-size: 16px; font-weight: 700; font-family: inherit; cursor: pointer;
            transition: all 0.3s; letter-spacing: 0.3px;
        }
        .btn-primary:hover { transform: translateY(-2px); box-shadow: 0 8px 28px rgba(59,130,246,0.35); }
        .btn-primary:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }

        /* ===== EXAM SCREEN ===== */
        #exam-screen { display: none; }

        .top-bar {
            position: sticky; top: 0; z-index: 100;
            background: var(--topbar-bg); backdrop-filter: blur(20px);
            border-bottom: 1px solid var(--border-default); padding: 10px 20px;
            transition: background-color 0.4s;
        }
        .top-inner { max-width: 880px; margin: 0 auto; display: flex; align-items: center; justify-content: space-between; gap: 12px; flex-wrap: wrap; }
        .stu-info { display: flex; align-items: center; gap: 10px; }
        .stu-avatar { width: 36px; height: 36px; border-radius: 10px; display: flex; align-items: center; justify-content: center; font-weight: 700; font-size: 15px; color: white; }
        .stu-name { font-weight: 600; font-size: 14px; }

        .timer-box { display: flex; align-items: center; gap: 7px; background: var(--bg-card); border: 1px solid var(--border-default); border-radius: 12px; padding: 7px 14px; transition: all 0.3s; }
        .timer-display { font-family: 'JetBrains Mono', monospace; font-size: 20px; font-weight: 600; color: var(--accent-cyan); min-width: 75px; text-align: center; }
        .timer-box.warn .timer-display { color: var(--accent-amber); }
        .timer-box.danger .timer-display { color: var(--accent-red); animation: pulse 1s infinite; }

        .progress-strip { max-width: 880px; margin: 0 auto; padding: 0 20px; }
        .progress-info { display: flex; justify-content: space-between; margin: 14px 0 6px; font-size: 12px; color: var(--text-secondary); }
        .progress-bg { width: 100%; height: 5px; background: var(--bg-option); border-radius: 3px; overflow: hidden; }
        .progress-fill { height: 100%; border-radius: 3px; transition: width 0.4s ease; width: 0%; }

        /* Questions */
        .q-container { max-width: 880px; margin: 0 auto; padding: 20px; }
        .sec-header { text-align: center; margin: 32px 0 20px; position: relative; }
        .sec-header::before { content:''; position:absolute; top:50%; left:0; right:0; height:1px; background: linear-gradient(to right, transparent, var(--border-default), transparent); }
        .sec-header h2 { display: inline-block; background: var(--bg-primary); padding: 0 20px; position: relative; font-size: 17px; font-weight: 700; transition: background-color 0.4s; }
        .sec-badge { display: inline-block; background: var(--bg-card); border: 1px solid var(--border-default); border-radius: 18px; padding: 3px 14px; font-size: 10px; color: var(--accent-cyan); margin-top: 6px; font-weight: 600; letter-spacing: 1px; text-transform: uppercase; }

        .q-block {
            background: var(--bg-card); border: 1px solid var(--border-default); border-radius: 14px;
            padding: 22px; margin-bottom: 16px; transition: all 0.3s;
        }
        .q-block:hover { border-color: rgba(59,130,246,0.25); box-shadow: var(--shadow-glow); }
        .q-block.answered { border-color: rgba(16,185,129,0.3); }

        .q-stem { display: flex; gap: 12px; margin-bottom: 14px; align-items: flex-start; }
        .q-num { flex-shrink: 0; width: 36px; height: 36px; border-radius: 10px; display: flex; align-items: center; justify-content: center; font-family: 'Inter'; font-weight: 800; font-size: 14px; color: white; }
        .q-text { flex: 1; font-size: 15px; font-weight: 500; line-height: 1.8; padding-top: 5px; }

        .opts-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 9px; margin-left: 48px; }
        .opts-grid.single-col { grid-template-columns: 1fr; }

        .opt-label {
            display: flex; align-items: flex-start; gap: 10px; padding: 11px 14px;
            background: var(--bg-option); border: 1.5px solid var(--border-default); border-radius: 10px;
            cursor: pointer; transition: all 0.25s; position: relative; overflow: hidden;
        }
        .opt-label:hover { background: var(--bg-option-hover); border-color: rgba(59,130,246,0.35); }
        .opt-label.selected { background: var(--bg-option-selected); border-color: var(--border-selected); box-shadow: 0 0 16px rgba(59,130,246,0.08); }
        .opt-label.selected::before { content:''; position:absolute; top:0; left:0; width:3px; height:100%; background: var(--accent-blue); }
        .opt-label input[type="radio"] { display: none; }

        .radio-dot { flex-shrink: 0; width: 18px; height: 18px; border: 2px solid var(--border-default); border-radius: 50%; display: flex; align-items: center; justify-content: center; transition: all 0.25s; margin-top: 2px; }
        .opt-label.selected .radio-dot { border-color: var(--accent-blue); background: var(--accent-blue); }
        .opt-label.selected .radio-dot::after { content:''; width: 7px; height: 7px; background: white; border-radius: 50%; }

        .opt-letter { font-family: 'Inter'; font-weight: 700; font-size: 12px; color: var(--text-muted); min-width: 18px; margin-top: 1px; }
        .opt-label.selected .opt-letter { color: var(--accent-blue); }
        .opt-content { flex: 1; font-size: 13px; color: var(--text-secondary); line-height: 1.6; }
        .opt-label.selected .opt-content { color: var(--text-primary); }

        .submit-area { text-align: center; margin: 36px 0 50px; padding: 28px; background: var(--bg-card); border: 1px solid var(--border-default); border-radius: 20px; transition: all 0.3s; }
        .submit-area p { color: var(--text-secondary); margin-bottom: 18px; font-size: 13px; }
        .btn-submit { padding: 14px 44px; border: none; border-radius: 12px; color: white; font-size: 17px; font-weight: 700; font-family: inherit; cursor: pointer; transition: all 0.3s; }
        .btn-submit:hover { transform: translateY(-2px); box-shadow: 0 8px 28px rgba(59,130,246,0.35); }

        /* ===== RESULT SCREEN ===== */
        #result-screen { display: none; }
        .result-box { max-width: 880px; margin: 0 auto; padding: 20px; }

        .result-hero { text-align: center; padding: 40px 28px; background: var(--bg-card); border: 1px solid var(--border-default); border-radius: 20px; margin-bottom: 28px; position: relative; overflow: hidden; transition: all 0.3s; }
        .result-hero::before { content:''; position:absolute; top:0; left:0; right:0; height:4px; }
        .score-circle { width: 150px; height: 150px; border-radius: 50%; border: 5px solid var(--border-default); display: inline-flex; flex-direction: column; align-items: center; justify-content: center; margin-bottom: 20px; transition: border-color 0.3s; }
        .score-big { font-family: 'Inter'; font-size: 44px; font-weight: 900; line-height: 1; }
        .score-of { font-size: 13px; color: var(--text-muted); font-weight: 600; }
        .result-hero h2 { font-size: 24px; font-weight: 800; margin-bottom: 6px; }
        .result-hero .detail { color: var(--text-secondary); font-size: 13px; }

        .stats-grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 12px; margin-bottom: 28px; }
        .stats-grid .stat-card { background: var(--bg-card); border: 1px solid var(--border-default); border-radius: 14px; padding: 18px 10px; text-align: center; transition: all 0.3s; }
        .stats-grid .stat-card .s-icon { font-size: 24px; margin-bottom: 6px; }
        .stats-grid .stat-card .s-val { font-family: 'Inter'; font-size: 28px; font-weight: 800; margin-bottom: 3px; }
        .stats-grid .stat-card .s-lbl { font-size: 11px; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.4px; font-weight: 600; }
        .stats-grid .stat-card.correct .s-val { color: var(--accent-green); }
        .stats-grid .stat-card.wrong .s-val { color: var(--accent-red); }
        .stats-grid .stat-card.skipped .s-val { color: var(--accent-amber); }
        .stats-grid .stat-card.score .s-val { color: var(--accent-cyan); }
        .stats-grid .stat-card.pct .s-val { color: var(--accent-purple); }

        .neg-info { text-align: center; padding: 12px 20px; background: rgba(239,68,68,0.06); border: 1px solid rgba(239,68,68,0.15); border-radius: 10px; margin-bottom: 28px; font-size: 13px; color: var(--accent-red); }

        /* Leaderboard */
        .lb-section { background: var(--bg-card); border: 1px solid var(--border-default); border-radius: 16px; padding: 22px; margin-bottom: 28px; transition: all 0.3s; }
        .lb-section h3 { text-align: center; margin-bottom: 18px; font-size: 18px; }
        .lb-table { width: 100%; border-collapse: collapse; font-size: 13px; }
        .lb-table th, .lb-table td { padding: 12px 10px; border-bottom: 1px solid var(--border-default); text-align: left; }
        .lb-table th { color: var(--text-muted); font-weight: 600; text-transform: uppercase; font-size: 11px; letter-spacing: 0.5px; }
        .lb-table tr { transition: background 0.2s; }
        .lb-table tbody tr:hover { background: var(--bg-option); }
        .rank-1 { color: #f59e0b; font-weight: 800; }
        .rank-2 { color: #94a3b8; font-weight: 700; }
        .rank-3 { color: #b45309; font-weight: 700; }
        .lb-table .highlight-row { background: rgba(59,130,246,0.06); }

        /* Answer Review */
        .review-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 18px; flex-wrap: wrap; gap: 10px; }
        .review-header h3 { font-size: 18px; font-weight: 700; }

        .rev-block { background: var(--bg-card); border: 1px solid var(--border-default); border-radius: 14px; padding: 18px 20px; margin-bottom: 12px; transition: all 0.3s; }
        .rev-block.is-correct { border-left: 4px solid var(--accent-green); }
        .rev-block.is-wrong { border-left: 4px solid var(--accent-red); }
        .rev-block.is-skipped { border-left: 4px solid var(--accent-amber); }
        .rev-stem { display: flex; gap: 10px; align-items: flex-start; margin-bottom: 10px; }
        .rev-num { flex-shrink: 0; width: 30px; height: 30px; border-radius: 8px; display: flex; align-items: center; justify-content: center; font-weight: 800; font-size: 12px; color: white; }
        .rev-block.is-correct .rev-num { background: var(--accent-green); }
        .rev-block.is-wrong .rev-num { background: var(--accent-red); }
        .rev-block.is-skipped .rev-num { background: var(--accent-amber); }
        .rev-q-text { flex: 1; font-size: 13px; line-height: 1.7; padding-top: 3px; }
        .rev-tags { margin-left: 40px; display: flex; flex-wrap: wrap; gap: 7px; font-size: 12px; }
        .rev-tag { padding: 3px 10px; border-radius: 6px; font-weight: 600; }
        .rev-tag.correct-tag { background: rgba(16,185,129,0.1); color: var(--accent-green); border: 1px solid rgba(16,185,129,0.25); }
        .rev-tag.wrong-tag { background: rgba(239,68,68,0.1); color: var(--accent-red); border: 1px solid rgba(239,68,68,0.25); }
        .rev-tag.right-tag { background: rgba(16,185,129,0.1); color: var(--accent-green); border: 1px solid rgba(16,185,129,0.25); }
        .rev-tag.skip-tag { background: rgba(245,158,11,0.1); color: var(--accent-amber); border: 1px solid rgba(245,158,11,0.25); }

        .result-footer { text-align: center; padding: 28px; color: var(--text-muted); font-size: 12px; border-top: 1px solid var(--border-default); margin-top: 36px; }

        /* Modal */
        .modal-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: var(--modal-bg); backdrop-filter: blur(8px); z-index: 1000; align-items: center; justify-content: center; }
        .modal-overlay.show { display: flex; }
        .modal-box { background: var(--bg-card); border: 1px solid var(--border-default); border-radius: 20px; padding: 32px; max-width: 420px; width: 90%; text-align: center; box-shadow: var(--shadow-lg); animation: fadeUp 0.3s ease-out; }
        .modal-box .m-icon { font-size: 44px; margin-bottom: 14px; }

        .modal-box h3 { font-size: 19px; font-weight: 700; margin-bottom: 7px; }
        .modal-box p { color: var(--text-secondary); font-size: 13px; margin-bottom: 20px; line-height: 1.6; }
        .modal-btns { display: flex; gap: 10px; justify-content: center; }
        .m-btn { padding: 11px 24px; border-radius: 10px; font-size: 14px; font-weight: 600; cursor: pointer; transition: all 0.2s; font-family: inherit; border: none; }
        .m-btn.cancel { background: var(--bg-option); border: 1px solid var(--border-default); color: var(--text-secondary); }
        .m-btn.cancel:hover { background: var(--bg-option-hover); }
        .m-btn.ok { color: white; }
        .m-btn.ok:hover { transform: translateY(-1px); box-shadow: 0 4px 14px rgba(59,130,246,0.35); }
        .unanswered-warn { color: var(--accent-amber); font-size: 12px; margin-bottom: 14px; }

        /* ===== RESPONSIVE ===== */
        @media (max-width: 768px) {
            .reg-card { padding: 28px 20px; }
            .opts-grid { grid-template-columns: 1fr; margin-left: 0; }
            .stats-grid { grid-template-columns: repeat(3, 1fr); }
            .top-inner { flex-direction: column; gap: 6px; }
            .review-header { flex-direction: column; align-items: flex-start; }
            .q-stem { flex-direction: column; gap: 6px; }
            .q-num { width: 30px; height: 30px; font-size: 12px; border-radius: 8px; }
            .lb-table { font-size: 11px; }
            .lb-table th, .lb-table td { padding: 8px 5px; }
        }
        @media (max-width: 480px) {
            .stats-grid { grid-template-columns: repeat(2, 1fr); }
        }

        /* ===== TABS ===== */
        .tabs-container {
            display: flex;
            justify-content: center;
            gap: 10px;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }
        .tab-btn {
            padding: 10px 20px;
            background: var(--bg-card);
            border: 1px solid var(--border-default);
            color: var(--text-secondary);
            border-radius: 8px;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.3s;
        }
        .tab-btn:hover {
            background: var(--bg-card-hover);
        }
        .tab-btn.active {
            background: var(--bg-option-selected);
            color: var(--text-primary);
            border-color: var(--border-selected);
        }
        .tab-content {
            display: none;
        }
        .tab-content.active {
            display: block;
            animation: fadeUp 0.3s ease;
        }

        /* ===== LOCK SCREEN PODIUM ===== */
        .lock-screen-box {
            background: var(--bg-card);
            border: 1px solid rgba(239, 68, 68, 0.15);
            border-radius: 20px;
            padding: 32px 24px;
            text-align: center;
            margin-bottom: 28px;
            box-shadow: 0 8px 32px rgba(239, 68, 68, 0.04);
            position: relative;
            overflow: hidden;
            animation: fadeUp 0.4s ease-out;
            transition: background-color 0.4s, border-color 0.4s;
        }
        .lock-logo-container {
            display: flex;
            justify-content: center;
            align-items: center;
            margin-bottom: 20px;
        }
        .lock-logo-wrapper {
            position: relative;

<script>
// ===== SOUND EFFECTS (Web Audio API Synthesizer) =====
const SoundFX = {
    ctx: null,
    init() {
        if (!this.ctx) {
            this.ctx = new (window.AudioContext || window.webkitAudioContext)();
        }
    },
    playClick() {
        try {
            this.init();
            if (this.ctx.state === 'suspended') this.ctx.resume();
            const osc = this.ctx.createOscillator();
            const gain = this.ctx.createGain();
            osc.connect(gain);
            gain.connect(this.ctx.destination);
            
            osc.type = 'sine';
            osc.frequency.setValueAtTime(750, this.ctx.currentTime);
            osc.frequency.exponentialRampToValueAtTime(150, this.ctx.currentTime + 0.04);
            
            gain.gain.setValueAtTime(0.04, this.ctx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.001, this.ctx.currentTime + 0.04);
            
            osc.start();
            osc.stop(this.ctx.currentTime + 0.04);
        } catch (e) { console.warn("Audio error: ", e); }
    },
    playTick() {
        try {
            this.init();
            if (this.ctx.state === 'suspended') this.ctx.resume();
            const osc = this.ctx.createOscillator();
            const gain = this.ctx.createGain();
            osc.connect(gain);
            gain.connect(this.ctx.destination);
            
            osc.type = 'triangle';
            osc.frequency.setValueAtTime(900, this.ctx.currentTime);
            gain.gain.setValueAtTime(0.015, this.ctx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.001, this.ctx.currentTime + 0.02);
            
            osc.start();
            osc.stop(this.ctx.currentTime + 0.02);
        } catch (e) { console.warn("Audio error: ", e); }
    },
    playSuccess() {
        try {
            this.init();
            if (this.ctx.state === 'suspended') this.ctx.resume();
            const t = this.ctx.currentTime;
            const notes = [261.63, 329.63, 392.00, 523.25]; // C4, E4, G4, C5
            notes.forEach((freq, idx) => {
                const osc = this.ctx.createOscillator();
                const gain = this.ctx.createGain();
                osc.connect(gain);
                gain.connect(this.ctx.destination);
                
                osc.type = 'sine';
                osc.frequency.setValueAtTime(freq, t + idx * 0.08);
                
                gain.gain.setValueAtTime(0, t + idx * 0.08);
                gain.gain.linearRampToValueAtTime(0.08, t + idx * 0.08 + 0.04);
                gain.gain.exponentialRampToValueAtTime(0.001, t + idx * 0.08 + 0.35);
                
                osc.start(t + idx * 0.08);
                osc.stop(t + idx * 0.08 + 0.35);
            });
        } catch (e) { console.warn("Audio error: ", e); }
    },
    playLock() {
        try {
            this.init();
            if (this.ctx.state === 'suspended') this.ctx.resume();
            const t = this.ctx.currentTime;
            
            // Double bass thud
            [0, 0.06].forEach(delay => {
                const osc = this.ctx.createOscillator();
                const gain = this.ctx.createGain();
                osc.connect(gain);
                gain.connect(this.ctx.destination);
                
                osc.type = 'sine';
                osc.frequency.setValueAtTime(140, t + delay);
                osc.frequency.exponentialRampToValueAtTime(30, t + delay + 0.08);
                
                gain.gain.setValueAtTime(0.12, t + delay);
                gain.gain.exponentialRampToValueAtTime(0.001, t + delay + 0.08);
                
                osc.start(t + delay);
                osc.stop(t + delay + 0.08);
            });
            
            // Metallic high-frequency snap
            const oscMetal = this.ctx.createOscillator();
            const gainMetal = this.ctx.createGain();
            oscMetal.connect(gainMetal);
            gainMetal.connect(this.ctx.destination);
            
            oscMetal.type = 'triangle';
            oscMetal.frequency.setValueAtTime(1000, t);
            oscMetal.frequency.exponentialRampToValueAtTime(250, t + 0.04);
            
            gainMetal.gain.setValueAtTime(0.04, t);
            gainMetal.gain.exponentialRampToValueAtTime(0.001, t + 0.04);
            
            oscMetal.start(t);
            oscMetal.stop(t + 0.04);
        } catch (e) { console.warn("Audio error: ", e); }
    }
};

ৃদেস্পন্দনে, রক্তচাপি এবং লোলোক্ষরণ নেয়েন্ত্রিণ করার কন্দ্র হসব কাজ কর।", "মাইটাসস একটি সমবভাজনে (Equational division) প্রক্রেয়ো, যখানে অপিত্য কাষর ক্রোমাজাম সংখ্যা এবং\nপ্রক ৃ ত হুবহু মাতৃকাষর মতা থাক। একজনে পিুরুষর সাধিারণ দেহকাষ মাট ৪৬টি ক্রোমাজাম থাক যার বনে্যাস 44টি\nঅটাজাম + XY সক্সি ক্রোমাজাম। মাইটাসসর পির কাষ এই একই সংখ্যা বজায়ে থাকব।", "O রক্তর গ্রুপযেুক্ত ব্যক্তদের লোহত রক্তকণকায়ে কানো অ্যান্টিজনে (A বা B) নো থাকার কারণ এদের রক্ত য\nকানো অনে্য গ্রুপির প্রাপিকক দেওয়ো সম্ভব। তাই O গ্রুপিক 'সবর্ণিজনেীনে দোতা' বলো হয়ে। অনে্য দেক, AB গ্রুপিক 'সবর্ণিজনেীনে\nগ্রহীতা' বলো হয়ে।", "রক্ত হমাগ্লাবনে ভাঙনের ফলে উৎপিন্ন ইউরাক্রোম (Urochrome বা Urobilin) নোমক রঞ্জক পিদোথর্ণির উপিস্থিতর\nকারণ স্বাভাবক মানেুষর মূত্রের বণর্ণি হালেকা বা ঈষৎ হলেুদে রঙর হয়ে।", "অঙ্গসেংস্থানর ব্যবহার ও অব্যবহার সেূত্রেটি (Use and dis-use theory) জঁ বাপিতস্ত লে্যামাক র্ণি  (Jean-Baptiste\nLamarck)-এর ববত র্ণি নেবাদের প্রধিানে ভত্তি ছলে, ডারউইনের নেয়ে। ডারউইনের তত্ত্বর মূলে কথা ছলে অস্তত্বর জনে্য সংগ্রাম,\nপ্রাক ৃ তক নেবর্ণিাচনে এবং যাগ্যতমর উদ্বত র্ণি নে।", "ভিসোপ্রসেন (Vasopressin) বা অ্যান্টি-ডউরটিক হরমানে (ADH) বৃক্কীয়ে নোলেকায়ে জলের পিুনেঃশিাষণ বৃদ্ধি কর\nমূত্রের পিরমাণ ও ঘনেত্বর নেয়েন্ত্রিণ বজায়ে রাখ। এর অভাব বহুমূত্রে বা ডায়োবটিস ইনেসপিডাস রাগ দেখা দেয়ে।", "পিরপিাক হওয়ো সরলে খাদে্য উপিাদোনে ও পিুষ্টিরস প্রধিানেত ক্ষ ু দ্রান্ত্রে (Small intestine)-এর মধি্যস্থিত ভলোস (Villi) নোমক\nআঙুলের মতা প্রবধির্ণিক দ্বারা শিাষত হয়ে। বৃহদোন্ত্রি মূলেত জলে ও খনেজ লেবণ শিাষত হয়ে।", "সোলাকসেংশ্লেষ প্রক্রেয়ার আলাক-নভি র্দ র দশা বা আলাক বক্রেয়া ক্লারাপ্লাস্টর থাইলাকয়ডি পদ র্দ া\nসেম্বলত গ্রানা (Grana) অঞ্চল সেম্পন্ন হয়, কারণ এখান ক্লারাফেল ও সোলাকসেংশ্লেষীয় রঞ্জক অবস্থত। অন্ধকার\nদশা (Light-independent reaction) ক্লারাপ্লাস্টর স্ট্রামা অঞ্চল ঘট।", "অ্যালেডাস্টরনে, ইস্ট্রাজনে এবং অ্যান্ড্রাজনে সবকটিই কালেস্টরলে থক উৎপিন্ন লেপিড-ধিমর্মী বা স্টরয়েড হরমানে।\nঅনে্য দেক,  থাইরক্সিন (Thyroxine) হলে একটি অ্যামাইনো অ্যাসড (টাইরাসনে) ধিমর্মী বা আয়োডনেযুক্ত অ-স্টরয়েডালে\nহরমানে।", "একজনে সুস্থি প্রাপ্তবয়েস্ক মানেুষর প্রত চায়োলের অধির্ণিাংশির দেন্তে সংকত হলে: ২ জাড়িা ক ৃ ন্তেক (Incisor), ১ জাড়িা ছদেক\n(Canine), ২ জাড়িা পিুরঃপিষক (Premolar) এবং ৩ জাড়িা পিষক (Molar)। অথর্ণিাৎ \frac{2,1,2,3}{2,1,2,3} imes 2 = 32টি\nদে ঁ াত। সংকত রূপিটি হলে I_2 C_1 P_2 M_3।", "ডানে অলেন্দর প্রাচীর অবস্থিত সোইনাট্রিয়াল নাডি (SA Node) স্বয়েংক্রেয়েভাব হৃদেস্পন্দনের উদ্দীপিনো বা বদেু্যতক\nসংকত তর কর হৃদেস্পন্দনে শুরু কর। এই কারণ এক হৃদেপিণ্ডর 'প্রাক ৃ তক পিсমকার' বলো হয়ে।", "লাহত রক্তকণকা (Red  Blood  Cells  বা Erythrocytes)-এর মধি্য উপিস্থিত আয়েরনেযুক্ত রঞ্জক প্রাটিনে\nহমাগ্লাবনে ফ ু সফ ু স থক অক্সিজনে গ্রহণ কর অক্সিহমাগ্লাবনে যৌগ গঠনে কর দেহর সমস্ত কাষ পিরবহনে কর।", "গলেবলের নেীচ এবং ট্র্যাকয়োর উপির অবস্থিত তরুণাস্থি নেমর্ণিত প্রকাষ্ঠটিক ল্যারংক্সি (Larynx) বলে। এর মধি্য\nভাকালে কড র্ণি  থাক যা বায়েু প্রবাহর ফলে কম্পিত হয়ে শিব্দ উৎপিন্ন কর, তাই এক 'ভয়েস বক্সি' বা স্বরযন্ত্রি বলো হয়ে।", "ডায়েরয়ো, টাইফয়েড এবং আমাশিয়ে দেূষত জলের মাধি্যম ছড়িায়ে এবং এরা জলেবাহত রাগ। অনে্য দেক, ডিায়াবটিসে\n(Diabetes) কানো সংক্রোমক বা জলেবাহত রাগ নেয়ে;  এটি ইনেসুলেনে হরমানের অভাবজনেত একটি বপিাকীয়ে রাগ\n(Metabolic disorder)।", "বৃক্ক, গবনেী (Ureter), মূত্রেথলে (Urinary bladder) এবং মূত্রেনোলেী (Urethra) মানেব রচনেতন্ত্রির মূলে অংশি। কন্তু জরায়ু\n(Uterus) রচনেতন্ত্রির অংশি নেয়ে, এটি স্ত্রী প্রজনেনেতন্ত্রির (Female reproductive system) একটি পিশিীবহুলে অঙ্গ যখানে ভ্রূণ\nপ্রতস্থিাপিত হয়ে।", "স্তিন্যপায়ী প্রাণীদর ক্ষত্রে ডিম্বাণু এবং শুক্রোণুর মলন অথর্দাৎ নষক (Fertilization)  প্রক্রেয়াটি স্ত্রী\nজননতন্ত্রের ফ্যালাপিয়ান নালী (Fallopian tube)-র অ্যাম্পুলা (Ampulla) নামক অংশ সেম্পন্ন হয়।", "শরা (Veins)-ত রক্তর চাপি ধিমনেীর তুলেনোয়ে অনেক কম থাক, তাই রক্ত যাত অভকষর্ণির টানে বপিরীত দেক\nপ্রবাহত বা পিছনের দেক ফর নো যত পিার, সজনে্য শিরার অভ্যন্তের কপিাটিকা বা ভালেভ (Valves) উপিস্থিত থাক। ধিমনেীত\nকানো কপিাটিকা থাক can।", "চাখর রঙনে অংশি বা আইরসে (Iris) তারা রন্ধ্র (Pupil)-এর আকারক ছাট-বড়ি করার মাধি্যম চাখ প্রবশিকারী\nআলোর পিরমাণ নেয়েন্ত্রিণ কর। তীব্র আলোত আইরস সংক ু চত হয়ে তারা রন্ধ্রক ছাট কর এবং কম আলোত প্রসারত\nকর।", "BCG এর পিুরা নোম হলে Bacillus Calmette-Guérin। এই টিকাটি প্রধিানেত মাইকাব্যাকটরয়োম টিউবারকউলোসস\nদ্বারা সৃষ্ট মারাত্মক ব্যাধি যেক্ষ্মা (Tuberculosis) রাগর বরুদ্ধি দেীঘর্ণিময়োদেী অনোক্রেম্যতা বা প্রতরাধি ক্ষমতা গড়ি তালে।", "পিাখদের মাধি্যম সম্পিন্ন পিরাগযাগক অনর্দথাফেল (Ornithophily) বলে (যমনে—পিলোশি, শিমুলে ফ ু লে)। পিতঙ্গর\nমাধি্যম হলে তাক এন্টিমাফলে এবং বায়েুর মাধি্যম হলে অ্যানেমাফলে বলো হয়ে।", "মানেুষর ত্বক উপিস্থিত ৭-ডহাইড্রিাকালেস্টরলে সূযর্ণিালোকর অতবগুনে রশ্মির (UV-B) প্রভাব রাসায়েনেক বক্রেয়োর\nমাধি্যম সক্রেয়ে ভিটামন D (ক্যালসেফেরল)-এ রূপিান্তেরত হয়ে। তাই এক সূযর্ণিালোকর ভটামনেও বলো হয়ে।", "বাম নলয় (Left ventricle)-এর পিশিীবহুলে প্রাচীর সবচয়ে পিুরু এবং শিক্তশিালেী হয়ে। কারণ বাম নেলেয়েক মহাধিমনেীর\nমাধি্যম সারা শিরীর তীব্র চাপি রক্ত পিাম্পি করত হয়ে, যা অনে্য প্রকাষ্ঠগুলের তুলেনোয়ে অনেক বশি কাজ।", "মস্তষ্কে ও সুষুম্নাকাণ্ডর চারপিাশির প্রতরক্ষামূলেক আবরণী পিদে র্ণি া মনেনেজস-এর সাব-অ্যারাকনেয়েড স্পস য স্বচ্ছি\nতরলেটি থাক, তাক সেব্রাস্পাইনাল ফ্ল ু ইডি বা CSF বলে। এটি কন্দ্রীয়ে স্নায়েুতন্ত্রিক যান্ত্রিক আঘাত থক রক্ষা কর।\n(No Negative Marks)", "স্ত্রী প্রজনেনেতন্ত্রির মূলে অঙ্গগুলের মধি্য রয়েছ ডম্বাশিয়ে (Ovary), ফ্যালোপিয়োনে নোলেী (Fallopian tube) এবং জরায়েু বা\nগভ র্ণি াশিয়ে (Uterus)। অনে্যদেক, অণ্ডকাষ বা টস্টাস্টরনে উৎপিন্নকারী শুক্রোশিয়ে (Testis) হলে পিুরুষ প্রজনেনেতন্ত্রির প্রধিানে অংশি।", "মওসস কাশি বভাজনেক হ্রাস বভাজনে (Reductional division) বলো হয়ে কারণ এত ক্রোমাজাম সংখ্যা অধির্ণিক\nহয়ে যায়ে। এই বভাজনে একটি মাতৃকাষ থক ৪টি অপিত্য কাষ সৃষ্টি হয়ে। এটি জনেনে মাতৃকাষ ঘট এবং এর প্রফজ-১ দেশিায়ে\nক্রেসং ওভার সম্পিন্ন হয়ে। অতএব উক্ত (B) ও (D) সঠিক।", "দ্রাব্যতা অনেুসার ভটামনেক দেুই ভাগ ভাগ করা যায়ে। ফ্যাট বা চবর্ণিত দ্রবণীয়ে ভটামনেগুলে হলে—A, D, E এবং K।\nঅনে্য দেক, ভটামনে B-কমপ্লক্সি এবং ভটামনে C জলে দ্রবণীয়ে।", "RNA (Ribonucleic Acid)-এর গঠনে রাইবাজ শিক র্ণি রা থাক এবং নোইট্রাজনে বস হসব অ্যাডনেনে, গুয়োনেনে,\nসাইটাসনে এবং ইউরাসেল (Uracil) থাক। ডএনেএ-ত থাইমনে থাক কন্তু আরএনেএ-ত থাইমনের পিরবত র্ণি  ইউরাসলে\nথাক। ভ্যালেনে হলে একটি অ্যামাইনো অ্যাসড।", "গ্লুকাজ (মনোস্যাকারাইড) এবং স্টাচ র্ণি  বা শ্বতসার (পিলেস্যাকারাইড) হলে কাবর্ণিাহাইড্রিট বা শিক র্ণি রার উৎক ৃ ষ্ট উদোহরণ।\nমথওনোইনে একটি অ্যামাইনো অ্যাসড এবং ইথানেলে হলে একটি অ্যালেকাহলে।", "কলরা (Vibrio cholerae ব্যাক্টেরয়ো দ্বারা সৃষ্ট) এবং জয়াডি র্দ য়াসেসে (Giardia lamblia প্রাটাজায়ো দ্বারা সৃষ্ট) দেূষত\nজলে ও খাবারর মাধি্যম ছড়িায়ে। পিাটুর্ণিসস ও যক্ষ্মা হলে বায়েু বাহত শ্বাসযন্ত্রির রাগ।", "মানেুষর কন্দ্রীয়ে স্নায়েুতন্ত্রি (Central Nervous System - CNS) প্রধিানে দেুটি অংশি নেয়ে গঠিত: মস্তিষ্কে (Brain) এবং\nসেুষুম্নাকাণ্ড (Spinal cord)। হাতর স্নায়েু পিরধিীয়ে স্নায়েুতন্ত্রির অন্তেগর্ণিত এবং চাখ একটি গ্রাহক অঙ্গ।", "আমাদের ভুলে তথ্যগুলে চহ্নিত করত বলো হয়েছ। (A) ভুলে, কারণ ইস্ট্রাজনে একটি স্টরয়েড হরমানে, পিপিটাইড\nনেয়ে। (D) ভুলে, কারণ অ্যাড্রিনোলেনে আপিৎকালেীনে বা সংকটকালেীনে হরমানে, এটি জনেনে সরাসর সাহায্য কর নো। (B) এবং (C)\nসঠিক তথ্য। তাই উত্তির হলে (A) এবং (D)।", "লোলে অস্থিমজ্জা (Red Bone Marrow) হলে মানেুষর প্রধিানে রক্তাৎপিাদেক কলো (Hemopoietic tissue)। এখানে থকই\nসমস্ত রক্তকণকা যমনে—লোহত রক্তকণকা (RBC),  শ্বত রক্তকণকা (WBC)  এবং অণুচক্রেকা (Platelets)  উৎপিন্ন ও\nবকশিত হয়ে।", "হপিাটাইটিস B এবং পিালেও রাগ ভাইরাস দ্বারা ঘট। অনে্যদেক, তাহল কলরা (Vibrio cholerae ব্যাক্টেরয়ো দ্বারা)\nএবং টাইফেয়ডি (Salmonella typhi ব্যাক্টেরয়ো দ্বারা) ঘটিত রাগ, অথর্ণিাৎ এগুলে ভাইরাস দ্বারা সৃষ্ট নেয়ে।\nPHYSICAL SCIENCE (ভিৌত বজ্ঞান)", "লোহাক মরচার হাত থক রক্ষা করার জনে্য লোহার উপির গলেত দস্তিা বা জঙ্কের (Zinc) পিাতলো প্রলেপি দেওয়োর\nপিদ্ধিতকই গ্যালেভানোইজশিনে (Galvanization) বলো হয়ে।", "আলোক রশ্মি লেঘু মাধি্যম (বায়েু) থক ঘনে মাধি্যম (কাচ) প্রবশি করলে অভলেম্বর দেক সর আস। এই ক্ষত্রে চু্যত\nকাণ (\\delta) এর সূত্রেটি হলে:\n\\delta = i - \fr\nএখানে আপিতনে কাণ, i = 30^\\ci\frc এবং প্রতসরণ কাণ, \fr = 20^\\ci\frc।\nঅতএব, চু্যত কাণ \\delta = 30^\\ci\frc - 20^\\ci\frc = 10^\\ci\frc।", "১২টি ইলেকট্রনে বশিষ্ট মৌলেটি হলে ম্যাগনেসয়োম (Mg)। এর ইলেকট্রনে বনে্যাস হলে 2, 8, 2। যহতু এত ৩টি কক্ষপিথ\nআছ (K, L, M), তাই এর পিযর্ণিায়ে সংখ্যা হব ৩। সবর্ণিবহঃস্থি কক্ষ ২টি ইলেকট্রনে থাকায়ে এটি পিযর্ণিায়ে সারণর ২ নম্বর শ্রেণত\nঅবস্থিত।", "তরঙ্গ বগ (v), কম্পিাঙ্ক (n) এবং তরঙ্গদেঘর্ণি্য (\\lambda) এর মধি্য গাণতক সম্পিক র্ণি টি হলে:\nv = n imes \\lambda\nএখানে কম্পিাঙ্ক n = 50 ext{ Hz} এবং তরঙ্গদেঘর্ণি্য \\lambda = 2 ext{ m}।\nঅতএব, তরঙ্গ বগ v = 50 imes 2 = 100 ext{ m/s}।", "লেন্সর ক্ষমতা (P) এবং মটার ফাকাস দেঘর্ণি্য (f)-এর সম্পিক র্ণি টি হলে P = \frac{1}{f} বা f = \frac{1}{P}।\nএখানে ক্ষমতা P = -2.0 ext{ D}।\nঅতএব ফাকাস দেঘর্ণি্য f = \frac{1}{-2.0} = -0.5 ext{ m} (বা -50 ext{ cm})। ঋণাত্মক চহ্নি নেদে র্ণি শি কর লেন্সটি একটি অবতলে\nলেন্স।", "ক ৃ তকাযর্ণির গাণতক রূপি হলে W = F \\cdot d \\cdot \\cos heta, যখানে F = প্রযুক্ত বলে, d = সরণ এবং heta = বলে ও\nসরণর মধি্যবতর্মী কাণ। স্পষ্টতই, ক ৃ তকাযর্ণি বস্তুর প্রাথমক বগর (Initial velocity) ওপির কানোভাবই নেভ র্ণি র কর নো।", "প্লাঙ্কর কায়োন্টিাম তত্ত্ব অনেুযায়েী, কানো আলোক ফাটনের শিক্ত (E) আলোর কম্পাঙ্কের (Frequency,  u) সরলে\nসমানেুপিাতক। সম্পিক র্ণি টি হলে:\nE = h u (যখানে h হলো প্লাঙ্কর ধ্রুবক)", "যখনে কানো তরঙ্গ (শিব্দ বা আলো) এক মাধি্যম থক অনে্য মাধি্যম প্রবশি কর, তখনে তার গতবগ এবং তরঙ্গদেঘর্ণি্য\nপিরবত র্ণি ত হয়ে কন্তু তরঙ্গর কম্পাঙ্কে (Frequency) সম্পিূণর্ণি অপিরবত র্ণি ত থাক, কারণ কম্পিাঙ্ক তরঙ্গর উৎসর ওপির নেভ র্ণি র\nকর।", "pH-এর সংজ্ঞা অনেুযায়েী, ext{pH} = -\\log[ ext{H}^+]। অথর্ণিাৎ, কানো দ্রবণর pH-এর মানে যত কম হব, দ্রবণ ext{H}\n^+ আয়েনের ঘনেত্ব বা অম্লতা তত বশি হব। এখানে লেবুর রসর pH সবচয়ে কম (২.২), তাই এত ext{H}^+ আয়েনের ঘনেত্ব\nসবচয়ে বশি।", "ক্যালেসয়োম আয়েনের যাজ্যতা হলো +2 ( ext{Ca}^{2+}) এবং ফসফট মূলেকর যাজ্যতা হলো -3 ( ext{PO}_4^{3-})।\nসংকত লেখার নেয়েম অনেুযায়েী যাজ্যতা বনেময়ে ঘটলে ক্যালেসয়োম ফসফটর সঠিক রাসায়েনেক সংকত হয়ে ext{Ca}_3(\next{PO}_4)_2।", "ক্ষারীয়ে পিটাশিয়োম মারকউরক আয়োডাইড ( ext{K}_2[  ext{HgI}_4])-ক নেসলোর বকারক বলে। এর সাথ\nঅ্যামানয়া ( ext{NH}_3) গ্যাসর বক্রেয়োয়ে মলেনে-এর ক্ষারকীয়ে আয়োডাইডর একটি সুপিরচত বাদোমী রঙর অধিঃক্ষপি\nউৎপিন্ন হয়ে। এটি অ্যামানেয়ো শিনোক্তকরণ পিরীক্ষা।", "প্রয়োজনেীয়ে তাপির সূত্রে: Q = m \\cdot c \\cdot \\Delta T\nএখানে, ভর m = 2 ext{ kg}, আপিক্ষক তাপি c = 4200 ext{ J/kg}\\cdot ext{K}, এবং তাপিমাত্রোর পিরবত র্ণি নে \\Delta T = 10^\\ci\frc\next{C} = 10 ext{ K}।\nঅতএব, Q = 2 imes 4200 imes 10 = 84000 ext{ Joule} = 84 ext{ kJ}।", "প্রত একক ক্ষত্রেফলের ওপির প্রযুক্ত লেম্ব বলেক চাপি বলে। চাপির SI একক হলে নেউটনে/মটার² ( ext{N/m}^2),\nবজ্ঞানেী ব্লেইস পিাস্কালের নোমানেুসার যাক পাস্কাল (Pascal) বলো হয়ে।", "সাধিারণ লেবণ বা সাডয়োম ক্লারাইডর ( ext{NaCl}) তীব্র বা সম্পিৃক্ত জলেীয়ে দ্রবণকই রসায়েনের ভাষায়ে ব্রাইন (Brine)\nবলো হয়ে। এটি শিল্পক্ষত্রে ক্লারনে ও কস্টক সাডা প্রস্তুতত ব্যবহৃত হয়ে।", "আগর্দন (Ar) হলে পিযর্ণিায়ে সারণর ১৮ নেম্বর শ্রেণর একটি নোবলে বা নেষ্ক্রিয়ে গ্যাস (Inert Gas)। এর সবর্ণিবহঃস্থি কক্ষটি\nইলেকট্রনে দ্বারা পিূণর্ণি (অষ্টক পিূণর্ণি) থাকার কারণ এটি রাসায়েনেকভাব অত্যন্তে স্থিতশিীলে এবং সবচয়ে কম সক্রেয়ে।", "অভকষর্ণির বরুদ্ধি ক ৃ তকাযর্ণির সূত্রেটি হলে স্থিতশিক্তর সমানে: W = m \\cdot g \\cdot h\nএখানে, ভর m = 50 ext{ kg}, উচ্চতা h = 2 ext{ m}, এবং অভকষর্ণিজ ত্বরণ g = 9.8 ext{ m/s}^2।\nঅতএব, ক ৃ তকাযর্ণি W = 50 imes 9.8 imes 2 = 980 ext{ Joule}। সুতরাং শুধিুমাত্রে (A) সঠিক।", "দেুটি সমানে ধিারকত্ব C বশিষ্ট ধিারকক শ্রেণ সমবায়ে (Series) যুক্ত করলে সমতুলে্য ধিারকত্ব হয়ে: C_s = \frac{C \\cdot C}\n{C + C} = \frac{C}{2}।\nএবং তাদের সমান্তেরালে সমবায়ে (Parallel) যুক্ত করলে সমতুলে্য ধিারকত্ব হয়ে: C_p = C + C = 2C।\nঅতএব সঠিক বকল্পটি হলো C/2 এবং 2C।", "ব্রাঞ্জ (Bronze) হলে একটি অত্যন্তে গুরুত্বপিূণর্ণি মশ্রে ধিাতু বা সংকর ধিাতু। এর প্রধিানে উপিাদোনে উপিাদোনে দেুটি হলে তামা বা\nকপার (Copper - প্রায় 88%) এবং টিন (Tin - প্রায় 12%)।", "ত্বরণর সূত্রোনেুযায়েী, a = \frac{v - u}{t}\nএখানে প্রাথমক বগ u = 10 ext{ m/s}, চূড়িান্তে বগ v = 30 ext{ m/s}, এবং সময়ে t = 10 ext{ s}।\nঅতএব, ত্বরণ a = \frac{30 - 10}{10} = \frac{20}{10} = 2 ext{ m/s}^2।", "একই মৌলের ভন্ন পিরমাণু যাদের পিারমাণবক সংখ্যা বা প্রাটনে সংখ্যা সমানে কন্তু নেউট্রনে সংখ্যা ভন্ন হওয়োর কারণ\nভর সংখ্যা আলোদো হয়ে, তাদের আইসাটাপি বলে। যহতু একটি নেস্তড়িৎ পিরমাণুত প্রাটনে সংখ্যা ও ইলেকট্রনে সংখ্যা সমানে\nহয়ে, তাই আইসাটাপি জাড়ির প্রাটন সেংখ্যা এবং ইলকট্রন সেংখ্যা উভিয়ই সেমান থাক।\nMATHEMATICS (গণত)", "দ্বঘাত সমীকরণ ax^2 + bx + c = 0 এর সঙ্গ তুলেনো কর পিাই, a=1, b=-3, c=6।\nবীজদ্বয়ের যাগফলে: lpha + eta = - \frac{b}{a} = - \frac{-3}{1} = 3\nবীজদ্বয়ের গুণফলে: lpha eta = \frac{c}{a} = \frac{6}{1} = 6\nএখনে প্রদেত্তি রাশি: \frac{1}{ lpha} + \frac{1}{ eta} = \frac{ lpha + eta}{ lpha eta} = \frac{3}{6} = \frac{1}{2}।", "ধির ঘনেকর একটি বাহুর দেঘর্ণি্য = a একক।\nঘনেকর সমগ্রতলের ক্ষত্রেফলের সূত্রে = 6a^2 এবং আয়েতনের সূত্রে = a^3।\nপ্রশ্নানেুযায়েী, a^3 = 6a^2 \\implies a = 6 (যহতু বাহুর দেঘর্ণি্য শিূনে্য হত পিার নো)। অতএব ঘনেকর বাহুর দেঘর্ণি্য ৬ একক।", "সরলে সুদের সূত্রে: I = \frac{P \\cdot R \\cdot T}{100}\nএখানে সুদে I = 8 টাকা, বাষর্ণিক সুদের হার R = 5\\%, এবং সময়ে T = 3 ext{ মাস} = \frac{3}{12} ext{ বছর} = \frac{1}{4} ext{\nবছর}।\nসূত্রে বসয়ে পিাই: 8 = \frac{P imes 5 imes \frac{1}{4}}{100} \\implies 8 = \frac{5P}{400} \\implies 5P = 3200 \\implies P = 640\nটাকা।", "একটি বগর্ণিক্ষত্রের অন্তেবৃর্ণিত্তির ব্যাস সবর্ণিদো সই বগর্ণিক্ষত্রের বাহুর দেঘর্ণি্যর সমানে হয়ে।\nসুতরাং সবর্ণিবৃহৎ বৃত্তির ব্যাস = ৬ সম। অতএব বৃত্তিটির ব্যাসাধির্ণি (\fr) = \frac{6}{2} = 3 সম।\nবৃত্তির ক্ষত্রেফলের সূত্রে = \\pi \fr^2 = \\pi imes (3)^2 = 9\\pi ext{ বর্গ সম}।", "লেগারদেমর নেয়েম অনেুযায়েী, \\log A + \\log B = \\log(A imes B)।\nবামপিক্ষ: \\log \frac{c}{d} + \\log \frac{d}{c} = \\log\\left( \frac{c}{d} imes \frac{d}{c} ight) = \\log(1)।\nসুতরাং সমীকরণটি দে ঁ াড়িায়ে: \\log(1) = \\log x \\implies x = 1।", "অনেুসদ্ধিান্তের সূত্রোনেুযায়েী: A^3 + B^3 = (A+B)^3 - 3AB(A+B)\nএখানে, m^3 + \frac{1}{m^3} = \\left(m + \frac{1}{m} ight)^3 - 3 \\cdot m \\cdot \frac{1}{m} \\cdot \\left(m + \frac{1}{m} ight)\nমানে বসয়ে পিাই: (\\sq\frt{3})^3 - 3(\\sq\frt{3}) = 3\\sq\frt{3} - 3\\sq\frt{3} = 0।", "আমরা জানে য, an 60^\\ci\frc = \\sq\frt{3}।\nসুতরাং, an( heta + 15^\\ci\frc) = an 60^\\ci\frc \\implies heta + 15^\\ci\frc = 60^\\ci\frc \\implies heta = 45^\\ci\frc।\nএখনে প্রদেত্তি রাশিত মানে বসয়ে পিাই:  \\sin 45^\\ci\frc + \\cos 45^\\ci\frc = \frac{1}{\\sq\frt{2}} + \frac{1}{\\sq\frt{2}} = \frac{2}\n{\\sq\frt{2}} = \\sq\frt{2}।", "সহগ ৩, ৫ এবং ৯-এর লেসাগু (LCM) হলো ৪৫।\nঅনেুপিাত নেণর্ণিয়ের জনে্য প্রতটি পিদেক ৪৫ দ্বারা ভাগ কর:\nrac{3a}{45} = \frac{5b}{45} = \frac{9c}{45} \\implies \frac{a}{15} = \frac{b}{9} = \frac{c}{5}\nঅতএব, a:b:c = 15:9:5।", "প্রথম n সংখ্যক স্বাভাবক সংখ্যার বগর্ণির সমষ্টির সূত্রেটি হলে: S_n = \frac{n(n+1)(2n+1)}{6}\nএখানে n = 15।\nমানে বসয়ে পিাই: S_{15} = \frac{15 imes (15+1) imes (2 imes 15 + 1)}{6} = \frac{15 imes 16 imes 31}{6} = \frac{7440}{6} =\n1240।", "আমরা জানে সরলে অংশিীদোর কারবার মূলেধিনের অনেুপিাতই লোভ বণ্টনের অনেুপিাত হয়ে।\nঅনেুপিাতর পিদের সমষ্টি = 10 + 12 + 15 = 37।\nতৃতীয়ে বন্ধ ু র আনেুপিাতক ভাগহার = \frac{15}{37}।\nঅতএব, তৃতীয়ে বন্ধ ু র লেভ্যাংশি = 37,000 imes \frac{15}{37} = 15,000 টাকা।\nGENERAL KNOWLEDGE (সোধারণ জ্ঞান)", "তুরস্কর বখ্যাত শিহর ইস্তিাম্বুল (Istanbul) বশ্বর একমাত্রে শিহর যা একই সাথ এশিয়ো এবং ইউরাপি—এই দেুটি মহাদেশি\nজুড়ি বস্তৃত। বসফরাস প্রণালেী এই শিহরটিক দেুটি অংশি বভক্ত করছ।", "হমালেয়ে পিবর্ণিতমালোয়ে নেপিালে ও তব্বত সীমান্তে অবস্থিত মাউন্টি এভারস্ট (Mount Everest) সমুদ্রপিৃষ্ঠ থক ৮,৮৪৮.৮৬\nমটার উচ্চতা বশিষ্ট পিৃথবীর সবর্ণিাচ্চ পিবর্ণিত শিৃঙ্গ। K2 হলো পিৃথবীর দ্বতীয়ে সবর্ণিাচ্চ শিৃঙ্গ।", "বত র্ণি মানে প্রশিাসনেকভাব পিশ্চমবঙ্গর মাট ২৩টি (23) জলা রয়েছ। সবর্ণিশিষ গঠিত জলোটি ছলে ঝাড়িগ্রাম এবং\nকালেম্পিং ও পিশ্চম বধির্ণিমানে ২০১৭ সালে গঠিত হয়ে।", "ভারতর জাতীয়ে পিতাকার সবচয়ে ওপিরর গরুয়া (Saffron) রঙটি সাহস এবং আত্মত্যাগর (Courage and\nSacrifice) প্রতীক। মাঝখানের সাদো শিান্তে ও সত্যর প্রতীক এবং নেীচর সবুজ অংশি সমৃদ্ধি ও বশ্বাসর প্রতীক।", "রাষ্ট্রসংঘর নেরাপিত্তিা পিরষদের (UNSC) মাট ৫টি স্থায়ী সেদসে্য দশ (P5) রয়েছ। দেশিগুলে হলে—আমরকা যুক্তরাষ্ট\n(USA), যুক্তরাজ্য (UK), রাশিয়ো, চীনে এবং ফ্রান্স। এদের প্রত্যকর 'ভটা' (Veto) দেওয়োর ক্ষমতা আছ।", "প্রথম বশ্বযুদ্ধি ১৯১৪ থক ১৯১৮ সোল পিযর্ণিন্তে স্থিায়েী হয়েছলে। অনে্য দেক, ১৯৩৯-১৯৪৫ সালে ছলে দ্বতীয়ে বশ্বযুদ্ধির\nসময়েকালে।", "আধিুনেক নোসর্ণিং সবার অগ্রদেূত ফ্লারন্স নোইটিংগলে ক্রেলেয়োর যুদ্ধির সময়ে আহত সনেকদের রাত প্রদেীপি বা লে্যাম্পি\nহাত সবা করতনে। এই কারণ তনে বশ্বজুড়ি \"Lady with the Lamp\" নোম পিরচত লোভ করনে।", "মানেুষর শিরীরর সামগ্রক বাহ্যক আবরণ সৃষ্টিকারী ত্বক বা চামড়া (Skin) হলে মানেবদেহর বৃহত্তিম অঙ্গ (Largest\norgan)। যদে বৃহত্তিম অভ্যন্তেরীণ গ্রন্থির কথা বলো হতা, তব উত্তির হতা লেভার বা যক ৃ ৎ।", "১৯১৩ সালে ত ঁ ার অমর কাব্যগ্রন্থি 'গীতাঞ্জলে' (Gitanjali)-এর জনে্য সাহত্য শিাখায়ে প্রথম এশিীয়ে এবং ভারতীয়ে হসব\nনোবলে পিুরস্কার অজর্ণিনে করনে রবীন্দ্রনাথ ঠোক ু র। স. ভ. রমনে ১৯৩০ সালে পিদোথর্ণিবজ্ঞানে নোবলে পিানে।", "ভারতীয়ে সংবধিানের অষ্টম তফসলে (Eighth Schedule) বত র্ণি মানে মাট ২২টি (22) সেরকার ভিাষাক স্বীক ৃ ত দেওয়ো\nহয়েছ। মূলে সংবধিানে প্রথম ১৪টি ভাষা অন্তেভু র্ণি ক্ত ছলে, পির বভন্ন সংশিাধিনেীর মাধি্যম সংখ্যাটি ২২ হয়ে।\nLOGICAL REASONING (লজক্যাল রজনং)", "চত্রে বা সটর চারপিাশির সংখ্যাগুলের গুণফলের মাধি্যম কন্দ্রর সংখ্যাটি গঠিত হয়েছ।\nপি্যাটানের্ণি ১: 7 imes 5 imes 2 = 70\nপি্যাটানের্ণি ২: 9 imes 3 imes 2 = 54\nসুতরাং, তৃতীয়ে সটর ক্ষত্রে উত্তির হব: 5 imes 9 imes 2 = 90।", "প্রতটি পিদের অক্ষরর মধি্য ব্যবধিানে লেক্ষ্য করা। প্রতটি পিদের অক্ষরগুলে একটি কর ঘর বাদে দেয়ে (+২) এগাচ্ছি:\nB (+2) → D (+2) → F\nF (+2) → H (+2) → J\nএকই নেয়েম মনে পিরবতর্মী পিদে হব J (+2) → L (+2) → N (JLN)।\nযাচাইকরণ: JLN এর শিষ অক্ষরর পির N (+2) → P (+2) → R (NPR) যা মলে যাচ্ছি।", "ইংরজ ক্যালেন্ডারর মাসগুলের দেনের সংখ্যার ভত্তিত এটি সাজানো হয়েছ:\nJanuary = ৩১ দেনে, August = ৩১ দেনে, May = ৩১ দেনে।\nকন্তু June (জুন) মাসে হলা ৩০ দনর। তাই এটি অনে্যগুলের থক আলোদো এবং সঠিক উত্তির।", "সংখ্যার শ্রেণটির পিদেগুলের পিারস্পরক পিাথর্ণিক্য ক্রেমান্বয়ে ৪-এর গুণতক আকার বৃদ্ধি পিাচ্ছি:\n11 - 7 = 4\n19 - 11 = 8\n31 - 19 = 12\nপিরবতর্মী পিাথর্ণিক্যটি হওয়ো উচত ১৬। অতএব নেণর্ণিয়ে সংখ্যা = 31 + 16 = 47।\nযাচাইকরণ: পিরবতর্মী পিদেটি হব 47 + 20 = 67 যা শ্রেণত উপিস্থিত আছ।", "ম let timerInterval = null;
let timeLeft = 90 * 60;
let studentName = '';

// ===== THEME =====
function toggleTheme() {
    const body = document.body;
    const btn = document.getElementById('themeToggle');
    if (body.getAttribute('data-theme') === 'dark') {
        body.setAttribute('data-theme', 'light');
        btn.textContent = '☀️';
        localStorage.setItem('exam_theme', 'light');
    } else {
        body.setAttribute('data-theme', 'dark');
        btn.textContent = '🌙';
        localStorage.setItem('exam_theme', 'dark');
    }
}

function loadTheme() {
    const saved = localStorage.getItem('exam_theme');
    if (saved === 'light') {
        document.body.setAttribute('data-theme', 'light');
        document.getElementById('themeToggle').textContent = '☀️';
    }
}

// ===== ATTEMPT STATE =====
function checkAttempted() {
    const data = localStorage.getItem(EXAM_KEY);
    if (data) {
        const p = JSON.parse(data);
        document.getElementById('reg-form').style.display = 'none';
        studentName = p.name;
        document.getElementById('reg-screen').style.display = 'none';
        document.getElementById('exam-screen').style.display = 'none';
        document.getElementById('result-screen').style.display = 'block';
        
        renderResultScreen(p.name, p.score, p.correct, p.wrong, p.skipped, p.percentage, p.timeTaken, p.results || [], true);
        fetchLeaderboard();
        return true;
    }
    return false;
}

// ===== START EXAM =====
function startExam() {
    const name = document.getElementById('studentName').value.trim();
    if (!name) { 
        alert('অনুগ্রহ করে নিজের নাম লিখুন।'); 
        return; 
    }
    studentName = name;
    
    SoundFX.init();
    SoundFX.playClick();
    
    document.getElementById('reg-screen').style.display = 'none';
    document.getElementById('exam-screen').style.display = 'block';
    document.getElementById('avatar').textContent = name.charAt(0).toUpperCase();
    document.getElementById('displayName').textContent = name;
    buildQuestions();
    startTimer();
    if (window.MathJax && window.MathJax.typesetPromise) window.MathJax.typesetPromise();
}

// ===== BUILD QUESTIONS =====
function buildQuestions() {
    const c = document.getElementById('qContainer');
    let html = ''; 
    let qi = 0;
    SECTIONS.forEach(sec => {
        html += `<div class="sec-header"><h2>${sec.title}</h2><div class="sec-badge">${sec.badge}</div></div>`;
        for (let i = sec.start; i <= sec.end; i++) {
            const q = QUESTIONS[qi];
            html += `<div class="q-block" id="qb-${q.n}">
                <div class="q-stem">
                    <span class="q-num gradient-bg">${q.n}</span>
                    <span class="q-text">${q.text}</span>
                </div>
                <div class="opts-grid">`;
            q.opts.forEach((opt, oi) => {
                html += `
                <label class="opt-label" id="ol-${q.n}-${oi}" onclick="selectOpt(${q.n},${oi})">
                    <input type="radio" name="q${q.n}" value="${oi}">
                    <span class="radio-dot"></span>
                    <span class="opt-letter">${OPT_LETTERS[oi]}</span>
                    <span class="opt-content">${opt}</span>
                </label>`;
            });
            html += '</div></div>';
            qi++;
        }
    });
    c.innerHTML = html;
}

// ===== SELECT OPTION =====
function selectOpt(qn, oi) {
    SoundFX.playClick();
    for (let i = 0; i < 4; i++) { 
        const e = document.getElementById(`ol-${qn}-${i}`); 
        if(e) e.classList.remove('selected'); 
    }
    const sel = document.getElementById(`ol-${qn}-${oi}`);
    if (sel) { 
        sel.classList.add('selected'); 
        sel.querySelector('input').checked = true; 
    }
    const blk = document.getElementById(`qb-${qn}`); 
    if(blk) blk.classList.add('answered');
    updateProgress();
}

function updateProgress() {
    let ans = 0;
    QUESTIONS.forEach(q => { 
        if (document.querySelector(`input[name="q${q.n}"]:checked`)) ans++; 
    });
    const pct = Math.round((ans / QUESTIONS.length) * 100);
    document.getElementById('answeredCount').textContent = `উত্তর: ${ans} / ${QUESTIONS.length}`;
    document.getElementById('progressPct').textContent = pct + '%';
    document.getElementById('progressFill').style.width = pct + '%';
}

// ===== TIMER =====
function startTimer() {
    updateTimerDisplay();
    timerInterval = setInterval(() => {
        timeLeft--;
        if (timeLeft <= 0) { 
            clearInterval(timerInterval); 
            timeLeft = 0; 
            updateTimerDisplay(); 
            alert('⏰ সময় শেষ! পরীক্ষা স্বয়ংক্রিয়ভাবে জমা হচ্ছে।'); 
            submitExam(); 
            return; 
        }
        updateTimerDisplay();
        const box = document.getElementById('timerBox');
        if (timeLeft <= 300) { 
            box.classList.add('danger'); 
            box.classList.remove('warn'); 
            SoundFX.playTick();
        } else if (timeLeft <= 900) { 
            box.classList.add('warn'); 
            box.classList.remove('danger'); 
        }
    }, 1000);
}

function updateTimerDisplay() {
    const m = Math.floor(timeLeft / 60), s = timeLeft % 60;
    document.getElementById('timerDisplay').textContent = String(m).padStart(2,'0') + ':' + String(s).padStart(2,'0');
}

// ===== MODAL =====
function showModal() {
    let un = 0;
    QUESTIONS.forEach(q => { 
        if (!document.querySelector(`input[name="q${q.n}"]:checked`)) un++; 
    });
    const w = document.getElementById('unansweredWarn');
    if (un > 0) { 
        w.style.display = 'block'; 
        w.textContent = `⚠️ ${un}টি প্রশ্নের উত্তর দেওয়া হয়নি!`; 
    } else { 
        w.style.display = 'none'; 
    }
    document.getElementById('confirmModal').classList.add('show');
}
function hideModal() { 
    document.getElementById('confirmModal').classList.remove('show'); 
}

// ===== SUBMIT EXAM =====
function submitExam() {
    hideModal();
    clearInterval(timerInterval);
    const name = studentName;
    let correct = 0, wrong = 0, skipped = 0;
    const results = [];

    QUESTIONS.forEach((q, idx) => {
        const sel = document.querySelector(`input[name="q${q.n}"]:checked`);
        const correctAns = ANSWER_KEY[idx];
        let status, studentAns;
        if (!sel) { 
            status = 'skipped'; 
            studentAns = -1; 
            skipped++; 
        } else {
            studentAns = parseInt(sel.value);
            if (studentAns === correctAns) { 
                status = 'correct'; 
                correct++; 
            } else { 
                status = 'wrong'; 
                wrong++; 
            }
        }
        results.push({ q, idx, status, studentAns, correctAns });
    });

    const rawScore = correct - (wrong * 0.25);
    const score = parseFloat(rawScore.toFixed(2));
    const percentage = parseFloat(((Math.max(0, score) / QUESTIONS.length) * 100).toFixed(1));
    const timeTaken = 90*60 - timeLeft;
    const tmMin = Math.floor(timeTaken / 60);
    const tmSec = timeTaken % 60;
    const timeStr = `${tmMin}m ${tmSec}s`;

    // Save locally
    localStorage.setItem(EXAM_KEY, JSON.stringify({ name, score, total: QUESTIONS.length, correct, wrong, skipped, percentage, date: new Date().toLocaleString('bn-IN'), timeTaken: timeStr, results }));

    document.getElementById('exam-screen').style.display = 'none';
    document.getElementById('result-screen').style.display = 'block';

    renderResultScreen(name, score, correct, wrong, skipped, percentage, timeStr, results, false);

    // Send to Google Sheets via Hybrid Submit (Fetch + JSONP Fallback)
    let submitted = false;
    function handleSuccess() {
        if (submitted) return;
        submitted = true;
        console.log('Exam result recorded!');
        fetchLeaderboard();
    }

    const submitParams = `?action=submit&examKey=${EXAM_KEY}&name=${encodeURIComponent(name)}&score=${score}&total=${QUESTIONS.length}&correct=${correct}&wrong=${wrong}&skipped=${skipped}&percentage=${percentage}&timeTaken=${encodeURIComponent(timeStr)}`;
    const submitUrl = SCRIPT_URL + submitParams;

    if (SCRIPT_URL.startsWith('http')) {
        console.log('Submitting via fetch()...');
        fetch(submitUrl, {
            method: 'GET',
            mode: 'cors',
            credentials: 'omit'
        })
        .then(res => {
            if (!res.ok) throw new Error('HTTP status ' + res.status);
            return res.json();
        })
        .then(data => {
            console.log('Submitted successfully via fetch()');
            handleSuccess();
        })
        .catch(err => {
            console.warn('fetch() failed, falling back to JSONP: ', err);
            
            const cb = 'submitCallback_' + Date.now();
            window[cb] = function(res) {
                console.log('Submitted successfully via JSONP');
                handleSuccess();
                delete window[cb];
            };

            const script = document.createElement('script');
            script.src = submitUrl + '&callback=' + cb;
            script.onerror = function() {
                console.error('JSONP submit script failed.');
                fetchLeaderboard();
            };
            document.body.appendChild(script);
        });
    } else {
        console.warn('Google Apps Script URL is empty or invalid.');
        fetchLeaderboard();
    }
}

function switchTab(tabId) {
    document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));
    document.querySelectorAll('.tab-content').forEach(content => content.classList.remove('active'));
    
    const btn = Array.from(document.querySelectorAll('.tab-btn')).find(b => b.getAttribute('onclick').includes(tabId));
    if (btn) btn.classList.add('active');
    
    document.getElementById(tabId).classList.add('active');
}

    else if (percentage >= 60) { emoji = '👏'; remark = 'ভালো করেছো! আরও চেষ্টা করো!'; }

    else { emoji = '📚'; remark = 'আরও অনেক পড়াশোনা দরকার।'; }

    const scoreDisplay = score % 1 === 0 ? score : score.toFixed(2);
    const deducted = parseFloat((wrong * 0.25).toFixed(2));

    let html = '';
    if (isReattempt) {
        html += `
        <div class="lock-screen-box">
            <div class="lock-logo-container">
                <div class="lock-logo-wrapper">
                    <span class="lock-logo-big">🔒</span>
                </div>
            </div>
            <h2>পরীক্ষা লক করা হয়েছে!</h2>
            <p class="lock-desc">আপনি ইতিমধ্যে এই পরীক্ষাটি সম্পন্ন করেছেন। পুনরায় পরীক্ষা দেওয়া সম্ভব নয়। আপনার পূর্বের ফলাফল নিচে মার্কশিটে দেওয়া হলো।</p>
            
            <div class="podium-title">🏆 শীর্ষ ৩ জন পরীক্ষার্থী (Top 3)</div>
            <div class="podium-wrapper" id="podiumWrapper">
                <p style="color:var(--text-muted); font-size:13px; margin: 10px 0;">শীর্ষ ৩ লোড হচ্ছে...</p>
            </div>
            <p class="podium-hint">💡 অন্যান্য সবার বিস্তারিত র্যাংকিং দেখতে নিচে <strong>"লিডারবোর্ড"</strong> ট্যাবে ক্লিক করুন।</p>
        </div>`;
        
        setTimeout(() => { SoundFX.playLock(); }, 300);
    } else {
        setTimeout(() => { SoundFX.playSuccess(); }, 300);
    }

    html += `
    <div class="tabs-container">
        <button class="tab-btn active" onclick="switchTab('tab-score')">📊 মার্কশিট</button>
        <button class="tab-btn" onclick="switchTab('tab-leaderboard')">🏆 লিডারবোর্ড</button>
        <button class="tab-btn" onclick="switchTab('tab-answers')">📝 আপনার উত্তর</button>
        <button class="tab-btn" onclick="switchTab('tab-official')">📖 অফিশিয়াল সমাধান</button>
    </div>

    <div id="tab-score" class="tab-content active">
        <div class="result-hero">
            <div class="score-circle">
                <span class="score-big gradient-text">${scoreDisplay}</span>
                <span class="score-of">/ ${QUESTIONS.length}</span>
            </div>
            <h2>${emoji} ${remark}</h2>
            <p class="detail"><strong>${name}</strong> | সময়: ${timeStr}</p>
        </div>

        <div class="stats-grid">
            <div class="stat-card correct"><div class="s-icon">✅</div><div class="s-val">${correct}</div><div class="s-lbl">সঠিক</div></div>
            <div class="stat-card wrong"><div class="s-icon">❌</div><div class="s-val">${wrong}</div><div class="s-lbl">ভুল</div></div>
            <div class="stat-card skipped"><div class="s-icon">⏭️</div><div class="s-val">${skipped}</div><div class="s-lbl">বাদ</div></div>
            <div class="stat-card score"><div class="s-icon">📊</div><div class="s-val">${scoreDisplay}</div><div class="s-lbl">মোট নম্বর</div></div>
            <div class="stat-card pct"><div class="s-icon">📈</div><div class="s-val">${percentage}%</div><div class="s-lbl">শতাংশ</div></div>
        </div>

        <div class="neg-info">⚠️ নেগেティブ মার্কিং: ${wrong}টি ভুল × ০.২৫ = <strong>-${deducted}</strong> নম্বর কাটা হয়েছে। (${correct} - ${deducted} = ${scoreDisplay})</div>
        <div class="result-footer" style="margin-top:20px;"><p>ANM & GNM Mock Test • Test Exam 3 • ${new Date().toLocaleDateString('bn-IN')}</p></div>
    </div>

    <div id="tab-leaderboard" class="tab-content">
        <div class="lb-section" id="leaderboardContainer" style="margin-top:0;">
            <h3>🏆 লাইভ লিডারবোর্ড লোড হচ্ছে...</h3>
        </div>
    </div>

    <div id="tab-answers" class="tab-content">
        <div class="review-header" style="margin-top:0;"><h3>📝 আপনার দেওয়া উত্তরপত্র</h3></div>
        <div id="studentAnswersContainer"></div>
    </div>

    <div id="tab-official" class="tab-content">
        <div class="review-header" style="margin-top:0;"><h3>📖 অফিশিয়াল বিস্তারিত সমাধান</h3></div>
        <div id="officialAnswersContainer"></div>
    </div>
    `;

    document.getElementById('resultBox').innerHTML = html;

    // Render Student Answers
    let ansHtml = '';
    if(results && results.length > 0) {
        results.forEach(r => {
            const sc = r.status === 'correct' ? 'is-correct' : (r.status === 'wrong' ? 'is-wrong' : 'is-skipped');
            let tags = '';
            if (r.status === 'correct') {
                tags = `<span class="rev-tag right-tag">আপনার উত্তর: ${OPT_LETTERS[r.studentAns]} ✓</span>`;
            } else if (r.status === 'wrong') {
                tags = `<span class="rev-tag wrong-tag">আপনার উত্তর: ${OPT_LETTERS[r.studentAns]}</span><span class="rev-tag correct-tag">সঠিক উত্তর: ${OPT_LETTERS[r.correctAns]}</span>`;
            } else {
                tags = `<span class="rev-tag skip-tag">উত্তর দেওয়া হয়নি</span><span class="rev-tag correct-tag">সঠিক উত্তর: ${OPT_LETTERS[r.correctAns]}</span>`;
            }
            ansHtml += `<div class="rev-block ${sc}"><div class="rev-stem"><span class="rev-num">${r.q.n}</span><span class="rev-q-text">${r.q.text}</span></div><div class="rev-tags">&nbsp;${tags}</div></div>`;
        });
    } else {
        ansHtml = '<p style="text-align:center; padding:20px; color:var(--text-secondary);">উত্তরের তথ্য পাওয়া যায়নি।</p>';
    }
    document.getElementById('studentAnswersContainer').innerHTML = ansHtml;

    // Render Official Answers
    let offHtml = '';
    QUESTIONS.forEach((q, i) => {
        offHtml += `<div class="rev-block is-correct" style="border-left-color:var(--accent-blue); background:rgba(59,130,246,0.05); margin-bottom:20px; padding:20px;">
            <div class="rev-stem" style="border-bottom:1px solid var(--border-default); padding-bottom:12px; margin-bottom:12px;">
                <span class="rev-num" style="background:var(--accent-blue);">${q.n}</span>
                <span class="rev-q-text" style="font-size:16px;">${q.text}</span>
            </div>
            <div style="margin-bottom:12px;"><strong>সঠিক উত্তর:</strong> <span style="color:var(--text-primary); font-weight:600;">${OPT_LETTERS[ANSWER_KEY[i]]} ${q.opts[ANSWER_KEY[i]]}</span></div>
            <div style="font-size:14.5px; color:var(--text-secondary); line-height:1.7;">
                <strong style="color:var(--text-primary);">ব্যাখ্যা:</strong><br>${EXPLANATIONS[i] || 'এই প্রশ্নের বিস্তারিত ব্যাখ্যা উপলব্ধ নেই।'}
            </div>
        </div>`;
    });
    document.getElementById('officialAnswersContainer').innerHTML = offHtml;

    if (window.MathJax && window.MathJax.typesetPromise) {
        window.MathJax.typesetPromise([document.getElementById('tab-official'), document.getElementById('tab-answers')]);
    }
    window.scrollTo({top: 0, behavior: 'smooth'});
}

// ===== FETCH LEADERBOARD =====
function fetchLeaderboard() {
    const lc = document.getElementById('leaderboardContainer');
    if (!lc) return;

    lc.innerHTML = '<h3>🏆 লাইভ লিডারবোর্ড লোড হচ্ছে...</h3>';
    let loaded = false;

    function renderLeaderboard(data) {
        if (loaded) return;
        loaded = true;

        if (data && data.error) {
            lc.innerHTML = `<p style="text-align:center;color:var(--accent-red);padding:20px;font-weight:600;">⚠️ ত্রুটি: ${data.error}</p>`;
            return;
        }

        if (data && data.results && data.results.length > 0) {
            let h = `<div style="overflow-x:auto;"><table class="lb-table"><thead><tr><th>Rank</th><th>নাম</th><th>Score</th><th>✅</th><th>❌</th><th>⏭️</th><th>সময়</th></tr></thead><tbody>`;
            data.results.forEach((row, i) => {
                let rc = '', rd = i + 1;
                if (i === 0) { rc = 'rank-1'; rd = '🥇 1'; }
                else if (i === 1) { rc = 'rank-2'; rd = '🥈 2'; }
                else if (i === 2) { rc = 'rank-3'; rd = '🥉 3'; }
                const isMe = row.name === studentName;
                
                const corrVal = row.correct !== undefined && row.correct !== null ? row.correct : '-';
                const wrongVal = row.wrong !== undefined && row.wrong !== null ? row.wrong : '-';
                const skipVal = row.skipped !== undefined && row.skipped !== null ? row.skipped : '-';

                h += `<tr class="${isMe ? 'highlight-row' : ''}">
                    <td class="${rc}">${rd}</td>
                    <td>${row.name}${isMe ? ' ⭐' : ''}</td>
                    <td style="font-weight:bold;color:var(--accent-cyan);">${row.score}</td>
                    <td>${corrVal}</td>
                    <td>${wrongVal}</td>
                    <td>${skipVal}</td>
                    <td>${row.timeTaken || '-'}</td>
                </tr>`;
            });
            h += '</tbody></table></div>';
            lc.innerHTML = h;
        } else {
            lc.innerHTML = '<p style="text-align:center;color:var(--text-muted);padding:20px;">এখনও কেউ পরীক্ষা দেয়নি।</p>';
        }

        // Podium Rendering
        const podiumWrapper = document.getElementById('podiumWrapper');
        if (podiumWrapper && data && data.results) {
            const top3 = data.results.slice(0, 3);
            if (top3.length > 0) {
                let phtml = '';
                
                // 2nd (Silver)
                if (top3[1]) {
                    phtml += `
                    <div class="podium-card silver">
                        <span class="podium-badge">🥈</span>
                        <span class="podium-name">${top3[1].name}</span>
                        <span class="podium-score">${top3[1].score}</span>
                    </div>`;
                } else {
                    phtml += `<div class="podium-card silver" style="opacity:0.3; height:90px;"><span class="podium-badge">🥈</span><span class="podium-name">-</span></div>`;
                }

                // 1st (Gold)
                if (top3[0]) {
                    phtml += `
                    <div class="podium-card gold">
                        <span class="podium-badge">🥇</span>
                        <span class="podium-name">${top3[0].name}</span>
                        <span class="podium-score">${top3[0].score}</span>
                    </div>`;
                }

                // 3rd (Bronze)
                if (top3[2]) {
                    phtml += `
                    <div class="podium-card bronze">
                        <span class="podium-badge">🥉</span>
                        <span class="podium-name">${top3[2].name}</span>
                        <span class="podium-score">${top3[2].score}</span>
                    </div>`;
                } else {
                    phtml += `<div class="podium-card bronze" style="opacity:0.3; height:90px;"><span class="podium-badge">🥉</span><span class="podium-name">-</span></div>`;
                }
                
                podiumWrapper.innerHTML = phtml;
            } else {
                podiumWrapper.innerHTML = '<p style="color:var(--text-muted); font-size:13px;">এখনও কোনো ফলাফল নেই।</p>';
            }
        }
    }

    const fetchUrl = SCRIPT_URL + '?action=leaderboard&examKey=' + EXAM_KEY;
    console.log('Fetching leaderboard from: ', fetchUrl);
    
    if (SCRIPT_URL.startsWith('http')) {
        fetch(fetchUrl, {
            method: 'GET',
            mode: 'cors',
            credentials: 'omit'
        })
        .then(res => {
            if (!res.ok) throw new Error('HTTP status ' + res.status);
            return res.json();
        })
        .then(data => {
            console.log('Leaderboard successfully loaded via fetch()');
            renderLeaderboard(data);
        })
        .catch(err => {
            console.warn('fetch() failed, falling back to JSONP: ', err);
            
            const cb = 'lbCallback_' + Date.now();
            window[cb] = function(data) {
                console.log('Leaderboard successfully loaded via JSONP');
                renderLeaderboard(data);
                delete window[cb];
            };

            const script = document.createElement('script');
            script.src = fetchUrl + '&callback=' + cb;
            script.onerror = function() {
                console.error('JSONP script failed.');
                if (!loaded) {
                    lc.innerHTML = `
                        <div style="text-align:center;padding:20px;">
                            <p style="color:var(--accent-red);font-weight:600;margin-bottom:12px;">⚠️ লিডারবোর্ড লোড করা যায়নি।</p>
                            <button class="tab-btn" onclick="fetchLeaderboard()" style="padding:6px 16px;font-size:12px;">🔄 আবার চেষ্টা করুন</button>
                        </div>`;
                    const podiumWrapper = document.getElementById('podiumWrapper');
                    if (podiumWrapper) {
                        podiumWrapper.innerHTML = `
                            <div style="text-align:center; padding: 10px 0;">
                                <p style="color:var(--accent-red); font-size:12px; margin-bottom:6px;">⚠️ লোড করা যায়নি</p>
                                <button class="tab-btn" onclick="fetchLeaderboard()" style="padding:4px 10px;font-size:10px;">🔄 চেষ্টা করুন</button>
                            </div>`;
                    }
                }
            };
            document.body.appendChild(script);
        });
    } else {
        // No Script URL set, render dummy data for preview
        const dummyData = {
            results: [
                { name: "সৌমেন দত্ত", score: 58.25, correct: 59, wrong: 3, skipped: 3, timeTaken: "45m 12s" },
                { name: "প্রিয়া সেন", score: 52.00, correct: 54, wrong: 8, skipped: 3, timeTaken: "52m 30s" },
                { name: "অমিত প্রামাণিক", score: 48.75, correct: 51, wrong: 9, skipped: 5, timeTaken: "58m 10s" }
            ]
        };
        setTimeout(() => { renderLeaderboard(dummyData); }, 800);
    }
}

// ===== INIT =====
let lockSoundPlayed = false;

function triggerLockSoundIfReattempt() {
    if (localStorage.getItem(EXAM_KEY) && !lockSoundPlayed) {
        SoundFX.playLock();
        lockSoundPlayed = true;
    }
}

window.addEventListener('DOMContentLoaded', () => {
    loadTheme();
    const isAttempted = checkAttempted();
    
    if (isAttempted) {
        const resumeAudio = () => {
            SoundFX.init();
            if (SoundFX.ctx) {
                if (SoundFX.ctx.state === 'suspended') {
                    SoundFX.ctx.resume().then(() => {
                        triggerLockSoundIfReattempt();
                    });
                } else {
                    triggerLockSoundIfReattempt();
                }
            }
            document.removeEventListener('click', resumeAudio);
            document.removeEventListener('touchstart', resumeAudio);
        };
        
        document.addEventListener('click', resumeAudio);
        document.addEventListener('touchstart', resumeAudio);
    }
});
</script>
